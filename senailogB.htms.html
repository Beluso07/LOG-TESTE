<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOG SENAI-SP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 text-slate-800">

<header class="bg-gradient-to-r from-blue-700 to-blue-500 text-white p-6 shadow-lg">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold">LOG SENAI-SP</h1>
      <p class="text-sm opacity-90">Sistema Inteligente de Logística</p>
    </div>
    <div class="text-sm opacity-90">contato@logsenai.sp</div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

  <!-- DASHBOARD -->
  <div class="col-span-3 grid grid-cols-1 md:grid-cols-6 gap-4">

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Transportes</p>
      <p id="totalTransportes" class="text-2xl font-bold">0</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Em rota</p>
      <p id="emRota" class="text-2xl font-bold">0</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Eficiência</p>
      <p id="eficiencia" class="text-2xl font-bold">0%</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Capacidade Volume</p>
      <p id="capVolume" class="text-2xl font-bold">0 m³</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Usado Volume</p>
      <p id="usoVolume" class="text-2xl font-bold">0 m³</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Ocupação Frota</p>
      <p id="ocupacao" class="text-2xl font-bold">0%</p>
    </div>

  </div>

  <!-- BOTÃO -->
  <div class="bg-white rounded-xl shadow-md p-5 col-span-1">
    <h2 class="font-semibold mb-3">Ações</h2>
    <button onclick="abrirModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg transition">
      + Adicionar Transporte
    </button>
  </div>

  <!-- LISTA -->
  <div class="bg-white rounded-xl shadow-md p-5 col-span-2">
    <h2 class="font-semibold mb-3">Transportes</h2>
    <div id="lista" class="space-y-3"></div>
  </div>

  <!-- GRÁFICO -->
  <div class="bg-white rounded-xl shadow-md p-5 col-span-3 h-[350px]">
    <h2 class="font-semibold mb-3">Ocupação da Frota</h2>
    <canvas id="grafico"></canvas>
  </div>

</main>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-white p-6 rounded-xl shadow-xl w-96">
    <h2 class="text-lg font-bold mb-4">Cadastro de Transporte</h2>

    <select id="tipoTransporte" class="w-full border rounded-lg p-2 mb-2">
      <option>Rodoviário</option>
      <option>Marítimo</option>
      <option>Aéreo</option>
      <option>Ferroviário</option>
    </select>

    <input id="distancia" placeholder="Distância (km)" class="w-full border rounded-lg p-2 mb-2" />
    <input id="peso" placeholder="Peso (kg)" class="w-full border rounded-lg p-2 mb-2" />
    <input id="volume" placeholder="Volume (m³)" class="w-full border rounded-lg p-2 mb-2" />

    <select id="tipoCarga" class="w-full border rounded-lg p-2 mb-2">
      <option>Perecível</option>
      <option>Refrigerada</option>
      <option>Congelada</option>
      <option>Seca</option>
      <option>Frágil</option>
      <option>Perigosa</option>
      <option>Carga Viva</option>
      <option>Alto Valor</option>
    </select>

    <!-- NOVOS CAMPOS DE FRETE -->
    <input id="precoKm" placeholder="Preço por km (R$)" class="w-full border rounded-lg p-2 mb-2" />
    <input id="freteMinimo" placeholder="Frete mínimo (R$)" class="w-full border rounded-lg p-2 mb-2" />

    <input id="tempo" placeholder="Tempo estimado (horas)" class="w-full border rounded-lg p-2 mb-4" />

    <button onclick="adicionar()" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg">
      Salvar
    </button>

    <button onclick="fecharModal()" class="w-full mt-2 text-red-500">
      Cancelar
    </button>
  </div>
</div>

<script>
let transportes = JSON.parse(localStorage.getItem('transportes')) || [];
let grafico;

const frota = [
  { volume: 50, peso: 15000 },
  { volume: 40, peso: 12000 },
  { volume: 30, peso: 10000 }
];

function salvar(){
  localStorage.setItem('transportes', JSON.stringify(transportes));
  atualizar();
}

function abrirModal(){ document.getElementById('modal').classList.remove('hidden'); }
function fecharModal(){ document.getElementById('modal').classList.add('hidden'); }

function calcularFrete(t){
  const pesoCubo = t.volume * 300;
  const pesoFinal = Math.max(t.peso, pesoCubo);

  let frete = (t.distancia * t.precoKm) + pesoFinal * 0.8;

  const especiais = {
    'Perigosa': 1.3,
    'Carga Viva': 1.5,
    'Perecível': 1.2
  };

  if(especiais[t.tipo]) frete *= especiais[t.tipo];

  return Math.max(frete, t.freteMinimo);
}

function adicionar(){
  const t = {
    tipoTransporte: document.getElementById('tipoTransporte').value,
    distancia: +document.getElementById('distancia').value,
    peso: +document.getElementById('peso').value,
    volume: +document.getElementById('volume').value,
    tipo: document.getElementById('tipoCarga').value,
    precoKm: +document.getElementById('precoKm').value,
    freteMinimo: +document.getElementById('freteMinimo').value,
    tempo: +document.getElementById('tempo').value,
    status: "Em rota"
  };

  transportes.push(t);
  salvar();
  fecharModal();
}

function remover(i){
  transportes.splice(i,1);
  salvar();
}

function atualizar(){
  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  let emRota = 0;
  let usoVolume = 0;

  transportes.forEach((t,i)=>{
    if(t.status === "Em rota") emRota++;
    usoVolume += t.volume;

    const frete = calcularFrete(t);

    lista.innerHTML += `
      <div class='border rounded-lg p-3 flex justify-between items-center hover:bg-slate-50 transition'>
        <div>
          <p class='font-semibold'>${t.tipoTransporte}</p>
          <p class='text-sm text-slate-500'>${t.tipo} • ${t.distancia} km</p>
        </div>
        <div class='text-right'>
          <p class='font-bold'>R$ ${frete.toFixed(2)}</p>
          <button onclick="remover(${i})" class="text-red-500 text-sm">Remover</button>
        </div>
      </div>
    `;
  });

  const capVolume = frota.reduce((a,b)=>a+b.volume,0);
  const ocupacao = capVolume ? Math.round((usoVolume/capVolume)*100) : 0;

  document.getElementById('totalTransportes').innerText = transportes.length;
  document.getElementById('emRota').innerText = emRota;
  document.getElementById('eficiencia').innerText = transportes.length ? Math.round((emRota/transportes.length)*100) + '%' : '0%';

  document.getElementById('capVolume').innerText = capVolume + ' m³';
  document.getElementById('usoVolume').innerText = usoVolume + ' m³';
  document.getElementById('ocupacao').innerText = ocupacao + '%';

  atualizarGrafico();
}

function atualizarGrafico(){
  const ctx = document.getElementById('grafico');

  const dados = {
    Perecível:0, Refrigerada:0, Congelada:0, Seca:0, Frágil:0, Perigosa:0, "Carga Viva":0, "Alto Valor":0
  };

  transportes.forEach(t=>{
    if(dados[t.tipo] !== undefined) dados[t.tipo]++;
  });

  if(grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels:Object.keys(dados),
      datasets:[{ data:Object.values(dados) }]
    },
    options:{ responsive:true, maintainAspectRatio:false }
  });
}

atualizar();
</script>

</body>
</html>
