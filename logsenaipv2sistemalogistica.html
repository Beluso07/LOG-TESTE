<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOG SENAI-SP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 text-slate-800">

<header class="bg-gradient-to-r from-blue-700 to-blue-500 text-white p-6 shadow-lg">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold">LOG SENAI-SP</h1>
      <p class="text-sm opacity-90">Sistema Inteligente de Logística</p>
    </div>
    <div class="text-sm opacity-90">contato@logsenai.sp</div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

  <!-- DASHBOARD -->
  <div class="col-span-3 grid grid-cols-1 md:grid-cols-6 gap-4">

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Transportes</p>
      <p id="totalTransportes" class="text-2xl font-bold">0</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Em rota</p>
      <p id="emRota" class="text-2xl font-bold">0</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Eficiência</p>
      <p id="eficiencia" class="text-2xl font-bold">0%</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Capacidade Volume</p>
      <p id="capVolume" class="text-2xl font-bold">0 m³</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Usado Volume</p>
      <p id="usoVolume" class="text-2xl font-bold">0 m³</p>
    </div>

    <div class="bg-white rounded-xl shadow-md p-5 hover:shadow-xl transition">
      <p class="text-sm text-slate-500">Ocupação Frota</p>
      <p id="ocupacao" class="text-2xl font-bold">0%</p>
    </div>

  </div>

  <!-- BOTÃO -->
  <div class="bg-white rounded-xl shadow-md p-5 col-span-1">
    <h2 class="font-semibold mb-3">Ações</h2>
    <button onclick="abrirModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg transition">
      + Adicionar Transporte
    </button>
  </div>

  <!-- LISTA -->
  <div class="bg-white rounded-xl shadow-md p-5 col-span-2">
    <h2 class="font-semibold mb-3">Transportes</h2>
    <div id="lista" class="space-y-3"></div>
  </div>

  <!-- GRÁFICO -->
  <div class="bg-white rounded-xl shadow-md p-5 col-span-3 h-[350px]">
    <h2 class="font-semibold mb-3">Ocupação da Frota</h2>
    <canvas id="grafico"></canvas>
  </div>

</main>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center">
  <div class="bg-white p-6 rounded-xl shadow-xl w-96">
    <h2 class="text-lg font-bold mb-4">Cadastro de Transporte</h2>

    <select id="tipoTransporte" class="w-full border rounded-lg p-2 mb-2">
      <option>Rodoviário</option>
      <option>Marítimo</option>
      <option>Aéreo</option>
      <option>Ferroviário</option>
    </select>

    <input id="distancia" placeholder="Distância (km)" class="w-full border rounded-lg p-2 mb-2" />
    <input id="peso" placeholder="Peso (kg)" class="w-full border rounded-lg p-2 mb-2" />
    <input id="volume" placeholder="Volume (m³)" class="w-full border rounded-lg p-2 mb-2" />

    <select id="tipoCarga" class="w-full border rounded-lg p-2 mb-2">
      <option>Perecível</option>
      <option>Refrigerada</option>
      <option>Congelada</option>
      <option>Seca</option>
      <option>Frágil</option>
      <option>Perigosa</option>
      <option>Carga Viva</option>
      <option>Alto Valor</option>
    </select>

    <input id="tempo" placeholder="Tempo estimado (horas)" class="w-full border rounded-lg p-2 mb-4" />

    <button onclick="adicionar()" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg">
